[workspace]
members = ["bin/ethproofs-client", "bin/input-gen-server", "ethproofs-common"]
exclude = []
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
alloy-provider = { version = "1.1.0", default-features = false, features = [
    "reqwest",
    "reqwest-rustls-tls",
] }
anyhow = "1.0.97"
base64 = "0.22.1"
bincode = "1.3.3"
chrono = "0.4"
clap = { version = "4.5.21", features = ["derive"] }
dotenv = "0.15.0"
flate2 = "1.0.0"
futures-util = "0.3"
env_logger = "0.11.5"
ethers = { version = "2.0.14", features = ["ws"] }
ethers-core = { version = "2.0.14", features = ["serde"] }
log = "0.4.26"
rand = "0.9.0"
reqwest = { version = "0.12.15", features = ["json"] }
tar = "0.4.44"
tokio = { version = "1.44.0", features = ["full"] }
tokio-tungstenite = "0.21"
url = "2.5.4"
# input = { git = "https://github.com/0xPolygonHermez/zisk-eth-client.git" }
input = { path = "../zec-reth/crates/input" }
# guest = { git = "https://github.com/0xPolygonHermez/zisk-eth-client.git" }
guest = { path = "../zec-reth/crates/guest" }

[patch.crates-io]
# This patch removes "ring" as a dependency, that is not compatible with the ZisK toolchain
ethereum_hashing = { git = "https://github.com/jsign/ethereum_hashing", rev = "08c88633b700d7447ef840d19ce7b369c44311de" }

# Enable this for deterministic Hashmap sort
# alloy-evm = { git = "https://github.com/0xPolygonHermez/zisk-patch-alloy-evm.git", branch = "zisk-hints/v0.27.2" }
# Local development
# alloy-evm = { path = "../zisk-patch-alloy-evm/crates/evm" }

