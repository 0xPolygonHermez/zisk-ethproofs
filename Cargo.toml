[workspace]
members = ["bin/ethproofs-client", "bin/input-gen-server"]
exclude = []
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
alloy-provider = { version = "1.0.37", default-features = false, features = [
    "reqwest",
    "reqwest-rustls-tls",
] }
anyhow = "1.0.97"
base64 = "0.22.1"
bincode = "1.3.3"
chrono = "0.4"
clap = { version = "4.5.21", features = ["derive"] }
dotenv = "0.15.0"
flate2 = "1.0.0"
futures-util = "0.3"
env_logger = "0.11.5"
ethers = { version = "2.0", features = ["ws"] }
log = "0.4.26"
rand = "0.9.0"
reqwest = { version = "0.12.15", features = ["json"] }
rsp-host-executor = { git = "https://github.com/succinctlabs/rsp.git", rev = "be2fe1274414a33cab9adb68825dc2eb029c7a4a", features = ["execution-witness"]  }
rsp-primitives = { git = "https://github.com/succinctlabs/rsp.git", rev = "be2fe1274414a33cab9adb68825dc2eb029c7a4a" }
rsp-provider = { git = "https://github.com/succinctlabs/rsp.git", rev = "be2fe1274414a33cab9adb68825dc2eb029c7a4a" }
rsp-rpc-db = { git = "https://github.com/succinctlabs/rsp.git", rev = "be2fe1274414a33cab9adb68825dc2eb029c7a4a" }
# rsp-host-executor = { path = "../rsp/crates/executor/host"}
# rsp-client-executor = { path = "../rsp/crates/executor/client"}
tar = "0.4.44"
tokio = { version = "1.44.0", features = ["full"] }
tokio-tungstenite = "0.21"
url = "2.5.4"
