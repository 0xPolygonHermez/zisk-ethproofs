[package]
name = "ethproofs-client"
version = "0.1.0"
edition = "2021"
description = ""

[dependencies]
alloy-provider.workspace = true
anyhow.workspace = true
base64.workspace = true
bincode.workspace = true
chrono.workspace = true
clap.workspace = true
dotenv.workspace = true
ethers.workspace = true
env_logger.workspace = true
flate2.workspace = true
futures-util.workspace = true
log.workspace = true
rand.workspace = true
reqwest.workspace = true
tar.workspace = true
tokio.workspace = true
tokio-tungstenite.workspace = true
url.workspace = true
input.workspace = true
guest.workspace = true

lazy_static = "1.4"
axum = { version = "0.7", features = ["macros", "json"] }
bytemuck = "1.24.0"
prometheus = "0.14"
serde = "1.0.219"
serde_json = "1.0.143"
sqlx = { version = "0.8.6", features = ["mysql", "runtime-tokio", "macros", "tls-rustls"] }
tonic = "0.14"
zstd = "0.13.3"

# zisk-distributed-common = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "pre-develop-0.14.0" }
# zisk-common = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "pre-develop-0.14.0" }
# zisk-distributed-grpc-api = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "pre-develop-0.14.0" }
# ziskos = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "pre-develop-0.14.0" }
# Local development
zisk-distributed-common = { path = "../../../zisk/distributed/crates/common" }
zisk-common = { path = "../../../zisk/common" }
zisk-distributed-grpc-api = { path = "../../../zisk/distributed/crates/grpc-api" }
ziskos = { path = "../../../zisk/ziskos/entrypoint" }

ethproofs-common = { path = "../../ethproofs-common" }
regex = "1.12.2"

blst = { version = "=0.3.15" }
revm = { version = "31.0.2", default-features = false }

alloy-consensus = { version = "1.0.37", default-features = false, features = ["crypto-backend"] }
stateless-validator-reth = { git = "https://github.com/eth-act/ere-guests.git", rev = "c696d4bb8073190208a481174b48781544052c4d", features = ["host"]}

crypto = { path = "../../../zec-reth/crates/crypto" }

[target.'cfg(zisk_hints)'.dependencies]
alloy-primitives = { version = "1.5.0", default-features = false, features = ["native-keccak"] }
alloy-consensus = { version = "1.0.37", default-features = false, features = ["crypto-backend"] }

# [target.'cfg(not(zisk_hints))'.dependencies]
# alloy-primitives = { version = "1.5.0", default-features = false }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(zisk_hints)'] }