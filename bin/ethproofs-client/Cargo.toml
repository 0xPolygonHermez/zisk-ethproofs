[package]
name = "ethproofs-client"
version = "0.1.0"
edition = "2021"
description = ""

[dependencies]
alloy-provider.workspace = true
anyhow.workspace = true
base64.workspace = true
bincode.workspace = true
chrono.workspace = true
clap.workspace = true
dotenv.workspace = true
ethers.workspace = true
env_logger.workspace = true
flate2.workspace = true
futures-util.workspace = true
log.workspace = true
rand.workspace = true
reqwest.workspace = true
tar.workspace = true
tokio.workspace = true
tokio-tungstenite.workspace = true
url.workspace = true
input.workspace = true
guest-reth.workspace = true

lazy_static = "1.4"
axum = { version = "0.7", features = ["macros", "json"] }
bytemuck = "1.24.0"
prometheus = "0.14"
serde = "1.0.219"
serde_json = "1.0.143"
sqlx = { version = "0.8.6", features = ["mysql", "runtime-tokio", "macros", "tls-rustls"] }
tonic = "0.14"
zstd = "0.13.3"

zisk-distributed-common = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "feature/metadata-coordinator" }
zisk-common = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "feature/metadata-coordinator" }
zisk-distributed-grpc-api = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "feature/metadata-coordinator" }
ziskos = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "feature/metadata-coordinator" }
zisk-sdk = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "feature/metadata-coordinator" }
# Local development
# zisk-distributed-common = { path = "../../../zisk/distributed/crates/common" }
# zisk-common = { path = "../../../zisk/common" }
# zisk-distributed-grpc-api = { path = "../../../zisk/distributed/crates/grpc-api" }
# ziskos = { path = "../../../zisk/ziskos/entrypoint" }
# zisk-sdk = { path = "../../../zisk/sdk" }

ethproofs-common = { path = "../../ethproofs-common" }
regex = "1.12.2"

[target.'cfg(zisk_hints)'.dependencies]
alloy-primitives = { version = "1.5.6", default-features = false, features = ["native-keccak"] }
alloy-consensus = { version = "1.7.3", default-features = false, features = ["crypto-backend"] }
revm = { version = "34.0.0", default-features = false }

[features]
default = []
hints-debug = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(target_vendor, values("zisk"))', 'cfg(zisk_hints)', 'cfg(zisk_hints_debug)'] }
